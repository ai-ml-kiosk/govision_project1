<svg xmlns="http://www.w3.org/2000/svg" width="480" height="320" viewBox="0 0 480 320" role="img" aria-labelledby="title desc">
  <title id="title">GoVision Fusion UI runtime reference</title>
  <desc id="desc">Static SVG reference of the fusion viewer runtime layout with blended CSI and thermal overlay plus right control panel.</desc>
  <defs>
    <linearGradient id="scene" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="55%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <radialGradient id="hotspot" cx="48%" cy="45%" r="38%">
      <stop offset="0%" stop-color="#fef08a" stop-opacity="0.9"/>
      <stop offset="38%" stop-color="#ef4444" stop-opacity="0.68"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0.18"/>
    </radialGradient>
  </defs>
  <rect width="480" height="320" fill="#05070a"/>
  <rect x="0" y="0" width="352" height="320" fill="url(#scene)"/>
  <g stroke="#64748b" stroke-width="3" fill="none">
    <rect x="42" y="72" width="86" height="134" rx="6"/>
    <rect x="146" y="42" width="72" height="188" rx="6"/>
    <rect x="236" y="86" width="70" height="118" rx="6"/>
  </g>
